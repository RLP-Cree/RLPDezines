<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RLP Dezines — Indigenous Art, Apparel & Music</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://web.squarecdn.com/v1/square.js"></script>
    <style>
        :root { --blue: #2563EB; --orange: #EA580C; --surface: #0A0A0C; --border: #1F2937; }
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; overscroll-behavior-y: none; }
        .grid-texture { background-image: linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px); background-size: 48px 48px; }
        .glass { background: rgba(0,0,0,0.88); backdrop-filter: blur(16px); }
        .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        #cart-drawer { position: fixed; top: 0; right: 0; width: 100%; max-width: 420px; height: 100vh; background: #050507; border-left: 1px solid var(--border); z-index: 200; transform: translateX(100%); transition: transform 0.35s; display: flex; flex-direction: column; }
        #cart-drawer.open { transform: translateX(0); }
        .field { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 11px 14px; border-radius: 7px; }
        .skeleton { background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); animation: shimmer 1.4s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="min-h-screen">

<header class="fixed top-0 w-full border-b border-gray-900 z-50 glass">
    <div class="max-w-7xl mx-auto flex justify-between items-center px-5 py-4">
        <a href="#top" class="text-xl font-black italic bg-gradient-to-r from-blue-400 to-orange-400 bg-clip-text text-transparent">RLP</a>
        <nav class="hidden lg:flex items-center gap-7 text-[11px] font-bold uppercase tracking-widest text-gray-400">
            <a href="#shop-section" class="hover:text-white transition">Shop</a>
            <a href="tunes.html" class="hover:text-white transition">Music Studio</a>
        </nav>
        <button onclick="openCart()" class="text-orange-400 font-black text-[11px] uppercase tracking-widest">Cart</button>
    </div>
</header>

<section id="top" class="relative min-h-screen flex flex-col justify-center items-center text-center px-6 grid-texture">
    <h1 class="text-5xl sm:text-7xl font-black uppercase tracking-tighter mb-6">One Culture.<br><span class="bg-gradient-to-r from-blue-400 to-orange-400 bg-clip-text text-transparent">One Platform.</span></h1>
    <a href="tunes.html" class="bg-gradient-to-r from-blue-600 to-blue-500 text-white px-10 py-4 rounded-full font-black uppercase text-xs tracking-widest">Open RLP Tunes Player</a>
</section>

<section id="shop-section" class="py-24 px-6">
    <div class="max-w-6xl mx-auto">
        <div id="product-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="skeleton h-96"></div>
        </div>
    </div>
</section>

<div id="cart-drawer">
    <div class="flex justify-between items-center px-6 py-5 border-b border-gray-900">
        <h3 class="text-lg font-black uppercase tracking-widest">Your Cart</h3>
        <button onclick="closeCart()" class="text-gray-500">Close</button>
    </div>
    <div id="cart-items" class="flex-1 overflow-y-auto px-6 py-4 space-y-4"></div>
    <div class="px-6 py-5 border-t border-gray-900">
        <div class="flex justify-between mb-4"><span class="text-sm font-bold text-gray-400">Total</span><span id="cart-total" class="font-black text-xl">$0.00</span></div>
        <div id="checkout-form" class="hidden space-y-3">
            <input class="field" type="text" id="buyer-name" placeholder="Full name">
            <input class="field" type="email" id="buyer-email" placeholder="Email">
            <div id="card-container"></div>
            <button id="pay-btn" onclick="processPayment()" class="w-full bg-orange-600 py-4 rounded-lg font-black uppercase text-xs">Pay Now</button>
        </div>
        <button id="checkout-btn" onclick="showCheckout()" class="w-full bg-orange-600 py-4 rounded-lg font-black uppercase text-xs">Proceed to Checkout</button>
    </div>
</div>

<script>
    const FUNCTION = '/.netlify/functions/process-payment';
    let cart = []; let squareCard = null;

    async function loadCatalog() {
        const grid = document.getElementById('product-grid');
        try {
            const res = await fetch('/.netlify/functions/printful-products');
            const data = await res.json();
            grid.innerHTML = data.map(p => `
                <div class="product-card">
                    <img src="${p.image}" alt="${p.name}">
                    <div class="p-5">
                        <h4 class="font-bold text-white mb-2">${p.name}</h4>
                        <button onclick="addToCart('${p.id}', '${p.name}', '${p.variantId}', 'Regular', ${p.price})" class="w-full bg-gray-900 py-3.5 rounded-lg text-xs font-black uppercase">Add to Cart</button>
                    </div>
                </div>`).join('');
        } catch (e) { console.error(e); }
    }

    function openCart() { document.getElementById('cart-drawer').classList.add('open'); }
    function closeCart() { document.getElementById('cart-drawer').classList.remove('open'); }
    
    // Initializer
    loadCatalog();
</script>
</body>
</html>
